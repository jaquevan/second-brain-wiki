  # Vector Databases

  Specialized databases that store and query high-dimensional vector embeddings.
  Used heavily in RAG pipelines and similarity search applications.

  Key concepts:
  - Embeddings: dense numerical representations of text/images
  - Cosine similarity: primary distance metric for semantic search
  - HNSW: approximate nearest neighbor algorithm used by most vector DBs
  - Popular options: Pinecone, Weaviate, Qdrant, pgvector
  - Trade-off: speed vs recall (exact search is slow, approximate is fast)
